<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QR Studio</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="app">

        <header class="header">
            <div class="logo">QR</div>

            <div>
                <h1>QR Studio</h1>
                <p>Create QR codes instantly</p>
            </div>
        </header>


        <section class="card">

            <div class="tabs">

                <button
                    id="urlTab"
                    class="tab active"
                    onclick="setType('url')">
                    🔗 URL
                </button>

                <button
                    id="textTab"
                    class="tab"
                    onclick="setType('text')">
                    📝 Text
                </button>

            </div>


            <label id="inputLabel">
                Enter your URL
            </label>

            <textarea
                id="text"
                placeholder="https://example.com">
            </textarea>


            <div class="actions">

                <button
                    class="primary"
                    onclick="generateQR()">
                    Generate QR
                </button>

                <button
                    class="secondary"
                    onclick="clearQR()">
                    Clear
                </button>

            </div>


            <div
                id="qrcode"
                class="qr-container">
            </div>


            <div
                id="qrActions"
                class="qr-actions"
                hidden>

                <button
                    class="secondary"
                    onclick="downloadQR()">
                    📥 Download
                </button>

                <button
                    class="primary"
                    onclick="shareQR()">
                    📤 Share
                </button>

            </div>

        </section>


        <footer>
            <p>QR Studio • Simple & Fast</p>
        </footer>

    </main>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script src="script.js"></script>

</body>
</html>
